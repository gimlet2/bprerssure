<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood Pressure Monitor</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#2b6cb0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
      color: #2b6cb0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1.2rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: #2d3748;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #718096;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
      color: #2d3748;
      transition: border-color 0.2s;
    }

    .form-group input[type="number"]:focus {
      outline: none;
      border-color: #4299e1;
    }

    .timestamp-row {
      font-size: 0.8rem;
      color: #718096;
      text-align: center;
      margin-bottom: 0.8rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary { background: #3182ce; color: #fff; }
    .btn-primary:active { background: #2b6cb0; }

    .btn-export { background: #38a169; color: #fff; margin-top: 0.5rem; }
    .btn-export:active { background: #2f855a; }

    .btn-import { background: #805ad5; color: #fff; margin-top: 0.5rem; }
    .btn-import:active { background: #6b46c1; }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #e53e3e;
      font-size: 1rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }
    .btn-delete:active { background: #fff5f5; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      background: #ebf8ff;
      padding: 0.5rem 0.4rem;
      text-align: center;
      font-weight: 700;
      color: #2b6cb0;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: #f7fafc; }
    tbody td {
      padding: 0.45rem 0.4rem;
      text-align: center;
      color: #4a5568;
    }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 1rem 0;
    }

    /* BP category badge */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .badge-normal   { background: #c6f6d5; color: #276749; }
    .badge-elevated { background: #fefcbf; color: #744210; }
    .badge-high1    { background: #fed7aa; color: #7b341e; }
    .badge-high2    { background: #feb2b2; color: #742a2a; }
    .badge-crisis   { background: #9b2c2c; color: #fff; }

    /* Chart */
    canvas { max-width: 100%; }

    /* Reminders settings */
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .settings-toggle h2 { margin: 0; }
    .settings-body { margin-top: 0.8rem; }
    .settings-body.hidden { display: none; }

    .reminder-count-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      color: #4a5568;
    }
    .reminder-count-row select {
      padding: 0.3rem 0.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #2d3748;
    }

    .time-slots { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.8rem; }
    .time-slot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #718096;
    }
    .time-slot input[type="time"] {
      padding: 0.35rem 0.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #2d3748;
    }

    .settings-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a0aec0;
      margin: 0.6rem 0 0.5rem;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #4a5568;
      font-size: 0.85rem;
      padding: 0.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .btn-secondary:active { background: #cbd5e0; }

    /* Confirmation dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .confirm-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .confirm-box {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem 1.4rem 1.2rem;
      max-width: 300px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      text-align: center;
      transform: scale(0.92);
      transition: transform 0.15s;
    }
    .confirm-overlay.show .confirm-box { transform: scale(1); }
    .confirm-box .confirm-icon { font-size: 2rem; margin-bottom: 0.4rem; }
    .confirm-box .confirm-title {
      font-size: 1rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 0.3rem;
    }
    .confirm-box .confirm-msg {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 1.1rem;
    }
    .confirm-actions {
      display: flex;
      gap: 0.6rem;
    }
    .confirm-actions button {
      flex: 1;
      padding: 0.65rem;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-confirm-cancel { background: #e2e8f0; color: #4a5568; }
    .btn-confirm-cancel:active { background: #cbd5e0; }
    .btn-confirm-delete { background: #e53e3e; color: #fff; }
    .btn-confirm-delete:active { background: #c53030; }

    #permissionWarning {
      display: none;
    }
    .btn-calendar { background: #3182ce; color: #fff; margin-top: 0.5rem; }
    .btn-calendar:active { background: #2b6cb0; }
  </style>
</head>
<body>

<h1>💉 Blood Pressure Monitor</h1>

<!-- Input Card -->
<div class="card">
  <h2>New Measurement</h2>
  <div class="form-grid">
    <div class="form-group">
      <label for="sys">Sys <small>mmHg</small></label>
      <input id="sys" type="number" min="60" max="300" placeholder="120" />
    </div>
    <div class="form-group">
      <label for="dia">Dia <small>mmHg</small></label>
      <input id="dia" type="number" min="40" max="200" placeholder="80" />
    </div>
    <div class="form-group">
      <label for="pulse">Pulse <small>bpm</small></label>
      <input id="pulse" type="number" min="30" max="250" placeholder="70" />
    </div>
  </div>
  <div class="timestamp-row" id="currentTime"></div>
  <button class="btn btn-primary" onclick="app.save()">Save</button>
</div>

<!-- Chart Card -->
<div class="card" id="chartCard" style="display:none">
  <h2>Trend</h2>
  <canvas id="bpChart"></canvas>
</div>

<!-- Settings Card -->
<div class="card">
  <div class="settings-toggle" onclick="reminderUI.togglePanel()">
    <h2>⚙️ Settings</h2>
    <span id="settingsChevron">▼</span>
  </div>
  <div class="settings-body hidden" id="settingsBody">

    <p class="settings-section-label">⏰ Reminders</p>
    <div class="reminder-count-row">
      <label for="reminderCount">Reminders per day:</label>
      <select id="reminderCount" onchange="reminderUI.onCountChange()">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
    <div class="time-slots" id="timeSlots"></div>
    <button class="btn btn-calendar" onclick="reminderUI.downloadIcs()">📅 Add to Calendar</button>

    <p class="settings-section-label">💾 Data</p>
    <button class="btn btn-export" onclick="app.exportCsv()" id="exportBtn" style="display:none">⬇ Export CSV</button>
    <button class="btn btn-import" onclick="app.importCsv()">⬆ Import CSV</button>
    <input type="file" id="importFile" accept=".csv" style="display:none" onchange="app.handleImportFile(this)" />

    <div id="installSection" style="display:none; margin-top:0.8rem">
      <button class="btn btn-primary" id="installBtn" onclick="installApp()" style="margin-bottom:0.4rem">📲 Install App</button>
    </div>
    <div id="iosInstallHint" style="display:none; font-size:0.8rem; color:#4a5568; background:#ebf8ff; border-radius:6px; padding:0.5rem 0.7rem; margin-top:0.4rem">
      📱 On iOS: tap <strong>Share</strong> → <strong>Add to Home Screen</strong> in Safari to install.
    </div>
  </div>
</div>

<!-- History Card -->
<div class="card">
  <h2>History</h2>
  <div class="table-wrap">
    <table id="historyTable">
      <thead>
        <tr>
          <th>Date &amp; Time</th>
          <th>Sys</th>
          <th>Dia</th>
          <th>Pulse</th>
          <th>Category</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="6" class="empty-msg">No records yet.</td></tr>
      </tbody>
    </table>
    <div id="scrollSentinel" style="height:1px"></div>
  </div>
</div>

<div id="toast"></div>

<!-- Confirmation dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">Delete record?</div>
    <div class="confirm-msg">This action cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-confirm-delete" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<script>
/* ── IndexedDB layer ─────────────────────────────────────────────── */
const DB_NAME = 'bpmonitor';
const DB_VERSION = 1;
const STORE = 'measurements';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('timestamp', 'timestamp', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function addRecord(db, record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(record);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function getAllRecords(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function deleteRecord(db, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

/* ── BP Category ─────────────────────────────────────────────────── */
function bpCategory(sys, dia) {
  if (sys > 180 || dia > 120) return { label: 'Crisis',    cls: 'badge-crisis'   };
  if (sys >= 140 || dia >= 90) return { label: 'High II',  cls: 'badge-high2'    };
  if (sys >= 130 || dia >= 80) return { label: 'High I',   cls: 'badge-high1'    };
  if (sys >= 120)              return { label: 'Elevated',  cls: 'badge-elevated' };
  return                              { label: 'Normal',    cls: 'badge-normal'   };
}

/* ── Chart ───────────────────────────────────────────────────────── */
let bpChart = null;

function renderChart(records) {
  const sorted = [...records].sort((a, b) => a.timestamp - b.timestamp);
  const chartCard = document.getElementById('chartCard');

  if (sorted.length < 2) { chartCard.style.display = 'none'; return; }
  chartCard.style.display = '';

  const labels = sorted.map(r => {
    const d = new Date(r.timestamp);
    return formatDate(d) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  });

  const datasets = [
    { label: 'Systolic',  data: sorted.map(r => r.sys),   borderColor: '#e53e3e', backgroundColor: 'rgba(229,62,62,0.1)',  tension: 0.3, fill: false },
    { label: 'Diastolic', data: sorted.map(r => r.dia),   borderColor: '#3182ce', backgroundColor: 'rgba(49,130,206,0.1)', tension: 0.3, fill: false },
    { label: 'Pulse',     data: sorted.map(r => r.pulse), borderColor: '#38a169', backgroundColor: 'rgba(56,161,105,0.1)', tension: 0.3, fill: false },
  ];

  if (bpChart) {
    bpChart.data.labels = labels;
    bpChart.data.datasets = datasets;
    bpChart.update();
  } else {
    bpChart = new Chart(document.getElementById('bpChart'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
        scales: {
          y: { beginAtZero: false, min: 40 }
        }
      }
    });
  }
}

/* ── Table with infinite scroll ──────────────────────────────────── */
const PAGE_SIZE = 20;
let _tableRecords = [];
let _renderedCount = 0;
let _sentinel = null;
let _observer = null;

function rowHtml(r) {
  const d = new Date(r.timestamp);
  const dateStr = formatDate(d) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const cat = bpCategory(r.sys, r.dia);
  return `<tr>
    <td>${dateStr}</td>
    <td><strong>${r.sys}</strong></td>
    <td><strong>${r.dia}</strong></td>
    <td>${r.pulse ?? '—'}</td>
    <td><span class="badge ${cat.cls}">${cat.label}</span></td>
    <td><button class="btn-delete" onclick="app.deleteEntry(${r.id})" title="Delete">🗑</button></td>
  </tr>`;
}

function appendRows() {
  const tbody = document.getElementById('historyBody');
  const next = _tableRecords.slice(_renderedCount, _renderedCount + PAGE_SIZE);
  tbody.insertAdjacentHTML('beforeend', next.map(rowHtml).join(''));
  _renderedCount += next.length;
  if (_renderedCount >= _tableRecords.length && _observer) {
    _observer.disconnect();
    _observer = null;
  }
}

function renderTable(records) {
  const tbody = document.getElementById('historyBody');
  const exportBtn = document.getElementById('exportBtn');

  if (_observer) { _observer.disconnect(); _observer = null; }

  if (!records.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No records yet.</td></tr>';
    exportBtn.style.display = 'none';
    _tableRecords = [];
    _renderedCount = 0;
    return;
  }

  exportBtn.style.display = '';
  _tableRecords = [...records].sort((a, b) => b.timestamp - a.timestamp);
  _renderedCount = 0;
  tbody.innerHTML = '';
  appendRows();

  if (_renderedCount < _tableRecords.length) {
    _sentinel = document.getElementById('scrollSentinel');
    _observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) appendRows();
    }, { rootMargin: '100px' });
    _observer.observe(_sentinel);
  }
}

/* ── Date formatting ─────────────────────────────────────────────── */
function formatDate(d) {
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const da = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${da}`;
}

/* ── Clock ───────────────────────────────────────────────────────── */
function updateClock() {
  const d = new Date();
  document.getElementById('currentTime').textContent =
    formatDate(d) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* ── Toast ───────────────────────────────────────────────────────── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── Confirmation dialog ─────────────────────────────────────────── */
function confirmDialog() {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirmOverlay');
    overlay.classList.add('show');
    function finish(result) {
      overlay.classList.remove('show');
      document.getElementById('confirmOk').removeEventListener('click', onOk);
      document.getElementById('confirmCancel').removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onBackdrop);
      resolve(result);
    }
    function onOk() { finish(true); }
    function onCancel() { finish(false); }
    function onBackdrop(e) { if (e.target === overlay) finish(false); }
    document.getElementById('confirmOk').addEventListener('click', onOk);
    document.getElementById('confirmCancel').addEventListener('click', onCancel);
    overlay.addEventListener('click', onBackdrop);
  });
}

/* ── App ─────────────────────────────────────────────────────────── */
const app = (() => {
  let db = null;

  async function init() {
    db = await openDB();
    updateClock();
    setInterval(updateClock, 30000);
    await refresh();
  }

  async function refresh() {
    const records = await getAllRecords(db);
    renderTable(records);
    renderChart(records);
  }

  async function save() {
    const sys   = parseInt(document.getElementById('sys').value, 10);
    const dia   = parseInt(document.getElementById('dia').value, 10);
    const pulse = parseInt(document.getElementById('pulse').value, 10);

    if (!sys || !dia) { toast('Please enter Sys and Dia values.'); return; }

    await addRecord(db, { sys, dia, pulse: isNaN(pulse) ? null : pulse, timestamp: Date.now() });
    document.getElementById('sys').value = '';
    document.getElementById('dia').value = '';
    document.getElementById('pulse').value = '';
    toast('Saved ✓');
    await refresh();
  }

  async function deleteEntry(id) {
    if (!await confirmDialog()) return;
    await deleteRecord(db, id);
    await refresh();
  }

  function importCsv() {
    const input = document.getElementById('importFile');
    input.value = '';
    input.click();
  }

  async function handleImportFile(input) {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (!lines.length) { toast('Empty file.'); return; }

    // Skip header row
    const dataLines = lines[0].toLowerCase().startsWith('date') ? lines.slice(1) : lines;

    const existing = await getAllRecords(db);
    const existingTs = new Set(existing.map(r => r.timestamp));

    let imported = 0, skipped = 0;
    for (const line of dataLines) {
      // Split on comma but respect potential locale dates that may contain commas (unlikely, but safe)
      const parts = line.split(',');
      if (parts.length < 4) { skipped++; continue; }
      const [dateStr, timeStr, sysStr, diaStr, pulseStr] = parts;
      const sys   = parseInt(sysStr, 10);
      const dia   = parseInt(diaStr, 10);
      const pulse = parseInt(pulseStr, 10);
      if (!sys || !dia || sys < 60 || sys > 300 || dia < 40 || dia > 200) { skipped++; continue; }

      const ts = new Date(dateStr.trim() + ' ' + timeStr.trim()).getTime();
      if (!ts || isNaN(ts)) { skipped++; continue; }
      if (existingTs.has(ts)) { skipped++; continue; }

      await addRecord(db, { sys, dia, pulse: isNaN(pulse) ? null : pulse, timestamp: ts });
      existingTs.add(ts);
      imported++;
    }

    await refresh();
    toast(`Imported ${imported} record${imported !== 1 ? 's' : ''}${skipped ? ` (${skipped} skipped)` : ''} ✓`);
  }

  function exportCsv() {
    getAllRecords(db).then(records => {
      if (!records.length) return;
      const sorted = [...records].sort((a, b) => a.timestamp - b.timestamp);
      const header = 'Date,Time,Systolic,Diastolic,Pulse,Category';
      const rows = sorted.map(r => {
        const d = new Date(r.timestamp);
        const date = formatDate(d);
        const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const cat  = bpCategory(r.sys, r.dia).label;
        return [date, time, r.sys, r.dia, r.pulse ?? '', cat].join(',');
      });
      const csv  = [header, ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url,
        download: `bp-measurements-${new Date().toISOString().slice(0,10)}.csv`
      });
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  init();
  return { save, deleteEntry, exportCsv, importCsv, handleImportFile };
})();

/* ── Service Worker Registration ─────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
  });
  // Auto-reload when a new service worker takes over (new deploy detected)
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
}

/* ── Reminder UI (ICS-based) ─────────────────────────────────────── */
const reminderUI = (() => {
  const STORAGE_KEY = 'bpReminderSettings';
  const DEFAULTS = { count: 2, times: ['09:00', '21:00'], uids: [], sequence: 0 };
  let settings = { ...DEFAULTS };
  let panelOpen = false;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) settings = { ...DEFAULTS, ...JSON.parse(raw) };
    } catch (_) { settings = { ...DEFAULTS }; }
  }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  }

  function renderTimeSlots() {
    const container = document.getElementById('timeSlots');
    const fallbacks = ['09:00', '21:00', '12:00', '18:00'];
    while (settings.times.length < settings.count) {
      settings.times.push(fallbacks[settings.times.length] || '09:00');
    }
    container.innerHTML = '';
    for (let i = 0; i < settings.count; i++) {
      const div = document.createElement('div');
      div.className = 'time-slot';
      div.innerHTML = `<span>Reminder ${i + 1}:</span>
        <input type="time" value="${settings.times[i]}" data-idx="${i}" onchange="reminderUI.onTimeChange(this)" />`;
      container.appendChild(div);
    }
  }

  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('settingsBody').classList.toggle('hidden', !panelOpen);
    document.getElementById('settingsChevron').textContent = panelOpen ? '▲' : '▼';
  }

  function onCountChange() {
    settings.count = parseInt(document.getElementById('reminderCount').value, 10);
    persist();
    renderTimeSlots();
  }

  function onTimeChange(input) {
    settings.times[parseInt(input.dataset.idx, 10)] = input.value;
    persist();
  }

  function downloadIcs() {
    const times = settings.times.slice(0, settings.count);
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

    // Ensure we have a stable UID per slot; increment sequence on each download
    while (settings.uids.length < 4) {
      settings.uids.push(`${Date.now()}-${settings.uids.length}@bpmonitor`);
    }
    settings.sequence = (settings.sequence || 0) + 1;
    persist();

    function icsDate(date, h, m) {
      const pad = n => String(n).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}T${pad(h)}${pad(m)}00`;
    }

    const pad = n => String(n).padStart(2, '0');
    const now = new Date();
    const dtstamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

    const events = times.map((t, i) => {
      const [h, m] = t.split(':').map(Number);
      const dtStart = icsDate(start, h, m);
      return [
        'BEGIN:VEVENT',
        `UID:${settings.uids[i]}`,
        `DTSTAMP:${dtstamp}`,
        `DTSTART:${dtStart}`,
        `SEQUENCE:${settings.sequence}`,
        'DURATION:PT5M',
        'RRULE:FREQ=DAILY',
        'SUMMARY:Blood Pressure Measurement',
        'DESCRIPTION:Time to take your blood pressure measurement.',
        'BEGIN:VALARM',
        'TRIGGER:PT0S',
        'ACTION:DISPLAY',
        'DESCRIPTION:Time to take your blood pressure measurement.',
        'END:VALARM',
        'END:VEVENT'
      ].join('\r\n');
    });

    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Blood Pressure Monitor//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      ...events,
      'END:VCALENDAR'
    ].join('\r\n');

    const blob = new Blob([ics], { type: 'text/calendar' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
      href: url,
      download: 'bp-reminders.ics'
    });
    a.click();
    URL.revokeObjectURL(url);
  }

  function init() {
    load();
    document.getElementById('reminderCount').value = String(settings.count);
    renderTimeSlots();
  }

  return { init, togglePanel, onCountChange, onTimeChange, downloadIcs };
})();

/* ── PWA Install ─────────────────────────────────────────────────── */
let _deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  document.getElementById('installSection').style.display = '';
  document.getElementById('iosInstallHint').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  document.getElementById('installSection').style.display = 'none';
});

async function installApp() {
  if (!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') _deferredInstallPrompt = null;
}

// Show iOS hint when running in Safari on iOS and not already installed
(function detectIOS() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone) {
    document.getElementById('iosInstallHint').style.display = '';
  }
})();

reminderUI.init();
</script>
